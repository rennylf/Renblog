<article>
  <p class="post-category"><a href="{{base}}category/{{categorySlug}}.html">{{categoryName}}</a></p>
  <h1 class="post-title">{{title}}</h1>
  <div class="post-meta">
    <time datetime="{{date}}">{{date}}</time>
    <span>&middot;</span>
    <span>{{readTime}}</span>
  </div>
  <div class="post-body">
    {{content}}
  </div>
</article>
<nav class="post-back">
  <a href="{{base}}index.html">← <span class="zh">返回首页</span><span class="en">Back to Home</span></a>
</nav>
